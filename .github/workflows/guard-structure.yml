name: guard-structure
# Enforces "humans only touch 00 Inbox" on PRs into main.
# Judged by = PR author (GitHub-authenticated, not forgeable) + changed paths.
# If the author is not an owner and anything outside 00 Inbox/ changed, the check fails.
# → Mark this check "required" in branch protection to make it a wall.
#
# Role split with protected-paths.yml (see _system/GOVERNANCE.md):
#   protected-paths = WHICH files are protected (branch-based; integrate/* passes)
#   guard-structure = WHO may land on main   (author-based; owners pass)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Non-owners must stay inside 00 Inbox
        env:
          # Space-separated GitHub logins, no @ (e.g. "alice bob").
          # Replace the placeholder — the kickoff interview offers to do this for you.
          OWNERS: "{{OWNER_HANDLE}}"
          AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if printf '%s' "$OWNERS" | grep -q '{{OWNER_HANDLE}}'; then
            echo "::warning::guard-structure is not configured yet — replace {{OWNER_HANDLE}} in .github/workflows/guard-structure.yml (and .github/CODEOWNERS). Passing neutrally."
            exit 0
          fi
          if printf ' %s ' $OWNERS | grep -q " $AUTHOR "; then
            echo "✅ Owner ($AUTHOR) PR — structure/context changes allowed"
            exit 0
          fi
          changed=$(git diff --name-only "$BASE" "$HEAD")
          echo "── changed files ──"; printf '%s\n' "$changed"
          bad=$(printf '%s\n' "$changed" | grep -v '^00 Inbox/' || true)
          if [ -n "$bad" ]; then
            echo "::error::Non-owner ($AUTHOR) cannot change files outside 00 Inbox/. The other folders are generated by AI/automation under owner approval. Violating paths:"
            printf '%s\n' "$bad"
            exit 1
          fi
          echo "✅ Changes stay inside 00 Inbox — pass"
