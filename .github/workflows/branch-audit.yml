name: Branch audit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Audit remote branches (read-only)
        run: |
          chmod +x scripts/branch-audit.sh
          scripts/branch-audit.sh origin main | tee branch-audit.md
      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: branch-audit
          path: branch-audit.md
      - name: Post report to tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          title="Branch audit report"
          number="$(gh issue list --state open --search "\"$title\" in:title" --json number --jq '.[0].number // empty')"
          if [ -z "$number" ]; then
            gh issue create --title "$title" --body-file branch-audit.md
          else
            gh issue comment "$number" --body-file branch-audit.md
          fi
